apiVersion: v2
name: the0
description: A distributed trading bot platform with backtesting, bot scheduling, and security analysis
type: application
version: 0.6.0
appVersion: "1.10.0"
kubeVersion: ">=1.21.0-0"
keywords:
  - trading
  - bots
  - backtesting
  - automation
  - fintech
home: https://github.com/alexanderwanyoike/the0
sources:
  - https://github.com/alexanderwanyoike/the0
icon: https://raw.githubusercontent.com/alexanderwanyoike/the0/main/assets/the0-icon.png
maintainers:
  - name: Alexander Wanyoike
    url: https://github.com/alexanderwanyoike
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "true"
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.the0.app
    - name: Source
      url: https://github.com/alexanderwanyoike/the0
    - name: Discord
      url: https://discord.gg/g5mp57nK
  artifacthub.io/changes: |
    - kind: added
      description: Health and readiness endpoints (/health, /health/ready) with dependency checks
    - kind: added
      description: "@CurrentUser() decorator replacing unsafe (request as any).user pattern"
    - kind: added
      description: BotConfig typed interface with noImplicitAny and ESLint no-explicit-any enforcement
    - kind: added
      description: Database indexes on all foreign key columns (bots, custom_bots, api_keys)
    - kind: added
      description: Chart version annotation on pod templates for Flux rollout detection
    - kind: security
      description: Prevent filePath IDOR in custom-bot deploy with path traversal protection
    - kind: security
      description: Remove unnecessary privileged mode from runtime containers
    - kind: security
      description: Require JWT_SECRET env var at startup with dotenv preload
    - kind: fixed
      description: CLI auth error matching uses typed APIError instead of brittle string matching
    - kind: fixed
      description: Replace ~95 any types with proper TypeScript types across API
    - kind: fixed
      description: Shared hasErrorCode and errorMessage utilities in common/result.ts
    - kind: fixed
      description: Treat Authentication required as terminal error in SSE log stream
  artifacthub.io/images: |
    - name: api
      image: ghcr.io/alexanderwanyoike/the0/api
    - name: frontend
      image: ghcr.io/alexanderwanyoike/the0/frontend
    - name: runtime
      image: ghcr.io/alexanderwanyoike/the0/runtime
